      description: 'Returns all deleted servers the authenticated user previously owned.'
      parameters:
        -
          in: query
          name: target_restore_server
          description: 'If present and set to an ID of an active Server, a `restore_info` relation will be added to each `deleted_server` object, indicating if the deleted server has a backup and if that backup can be restored to the specified server id. The <code>id</code> of an existing record in the servers table.'
