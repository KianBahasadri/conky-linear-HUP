      operationId: getUserDetails
      description: 'Returns information about the currently authenticated user.'
      parameters: []
      responses:
        200:
          description: 'Authenticated user details'
          content:
            application/json:
              schema:
                type: object
                example:
                  object: user
                  attributes:
                    id: null
                    admin: false
                    email: ethelyn.toy@langworth.com
                    language: en
                properties:
                  object:
                    type: string
                    example: user
                  attributes:
                    type: object
                    properties:
                      id:
                        type: string
                        example: null
                      admin:
                        type: boolean
                        example: false
                      email:
                        type: string
                        example: ethelyn.toy@langworth.com
                      language:
                        type: string
                        example: en
      tags:
        - Account
