  /api/client:
    get:
      summary: 'Get servers.'
      operationId: getServers
      description: "Returns all servers available to the authenticated user. Including\nboth servers they own and servers they are a subuser on."
      parameters:
        -
          in: query
          name: type
          description: "Filters servers by the authenticated user's relationship to them.\n\nIf empty (the default), all servers the authenticated user has access to will be returned.\n\nIf set to `owner`, only servers the authenticated user directly owns will be returned.\n\n(Admin-only) If set to `admin`, all servers the authenticated user doesn't own will be returned.\n\n(Admin-only) If set to `admin-all`, all servers on the panel will be returned."
          example: ''
          required: false
          schema:
            type: string
            description: "Filters servers by the authenticated user's relationship to them.\n\nIf empty (the default), all servers the authenticated user has access to will be returned.\n\nIf set to `owner`, only servers the authenticated user directly owns will be returned.\n\n(Admin-only) If set to `admin`, all servers the authenticated user doesn't own will be returned.\n\n(Admin-only) If set to `admin-all`, all servers on the panel will be returned."
            example: ''
            enum:
              - owner
              - admin
              - admin-all
